{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-container">
  <h2>Create New Password</h2>

  <form method="POST">
    {% csrf_token %}
    {% if form.errors %}
    <div style="color: red;">
        {{ form.errors }}
    </div>
    {% endif %}
    {{ form.new_password1 }}
    {{ form.new_password2 }}
    <button type="submit">Reset Password</button>
  </form>

</div>

</body>
</html>
