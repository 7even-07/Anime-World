{% load static  %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
        margin: 0;
        height: 100vh;
        background-image: url("{% static 'img/login-background/m-m-f.jpg' %}");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
  </style>
</head>
<body>
  <div class="login_form">
    <!-- Login form container -->
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <h3>Log in with</h3>

      <div class="login_option">
        <!-- Google button -->
        <div class="option">
          <a href="#">
            <img src="{% static 'img/logos/google.png' %}" alt="Google" />
            <span>Google</span>
          </a>
        </div>

        <!-- Apple button -->
        <div class="option">
          <a href="#">
            <img src="{% static 'img/logos/apple.png' %}" alt="Apple" />
            <span>Apple</span>
          </a>
        </div>
      </div>

      <!-- Login option separator -->
      <p class="separator">
        <span>or</span>
      </p>

      <!-- Email input box -->
      <div class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter email address" required />
      </div>

      <!-- Paswwrod input box -->
      <div class="input_box">
        <div class="password_title">
          <label for="password">Password</label>
          <a href="{% url 'password_reset' %}">Forgot Password?</a>
        </div>

        <!-- <input type="password" id="password" name="password" placeholder="Enter your password" required /> -->
        <div class="password-wrapper">
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
            <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
          </div>
      </div>

       <!-- Login button -->
      <button type="submit">Log In</button>

      <p class="sign_up">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
    </form>
  </div>

  <!-- jQuery -->
  <script src="{% static 'js/jquery-3.2.1.min.js' %}"></script>
  <!-- sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<!-- custom  -->
    <script src="{% static 'js/custom.js' %}"></script>
  {% if messages %}
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        "{% for message in messages %}"
          Swal.fire({
            icon: "{% if message.tags == 'success' %}success{% else %}error{% endif %}",
            title: "{{ message.tags|title }}",
            text: "{{ message }}",
            confirmButtonColor: "#3085d6",
          });
        "{% endfor %}"
      });
    </script>
  {% endif %}
</body>
</html>
